name: backend-ci

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-contract-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CoreService
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Contract check smoke test
        run: dotnet run --no-build --no-launch-profile --configuration Release -- --contract-check

